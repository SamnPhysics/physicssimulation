<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 GitHub 主頁</title>
    <style>
        /* 這裡放的是簡單的 CSS 樣式，讓網頁看起來更整潔 */
        body {
            font-family: "Helvetica Neue", Arial, "LiHei Pro", sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f6f8;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* 讓內容垂直置中 */
        }
        .container {
            max-width: 600px;
            padding: 40px;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #24292e; /* GitHub 的經典深色 */
        }
        p {
            color: #586069;
        }
        a {
            color: #0366d6;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>歡迎來到我的 GitHub 主頁！👋</h1>
        <p>這是我使用 GitHub Pages 建立的第一個網頁。</p>
        <p>您可以在這裡修改文字，加入您的自我介紹、專案連結或是履歷。</p>
        <p>前往 <a href="https://github.com/" target="_blank">我的 GitHub 專案庫</a> 看看吧！</p>
    </div>

</body>
</html>
