<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>廣義相對論：重力透鏡模擬</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050510;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(15, 20, 35, 0.85);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 320px;
            z-index: 10;
        }
        h1 {
            margin: 0 0 15px 0;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #ffaa00;
            text-shadow: 0 0 10px rgba(255, 170, 0, 0.3);
        }
        .control-group {
            margin-bottom: 20px;
        }
        .control-group label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ddd;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
            accent-color: #ffaa00;
        }
        .instructions {
            margin-top: 20px;
            font-size: 12px;
            color: #8892b0;
            line-height: 1.6;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .instructions span {
            color: #ffaa00;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #ffaa00;
            pointer-events: none;
        }
    </style>
    <!-- 使用 Import Map 載入 Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loading">載入物理引擎與宇宙場景...</div>
    
    <div id="ui-panel">
        <h1>重力透鏡模擬 (Gravitational Lensing)</h1>
        
        <div class="control-group">
            <label for="massSlider">
                <span>恆星質量 (時空曲率)</span>
                <span id="massValue">2.5 M☉</span>
            </label>
            <input type="range" id="massSlider" min="0.1" max="5.0" step="0.1" value="2.5">
        </div>
        
        <div class="control-group">
            <label for="raySlider">
                <span>觀測光線數量 (愛因斯坦環)</span>
                <span id="rayValue">4 道</span>
            </label>
            <input type="range" id="raySlider" min="1" max="4" step="1" value="4">
        </div>

        <div class="instructions">
            <strong>物理原理：</strong> 根據廣義相對論，大質量天體會扭曲其周圍的時空結構。當背景星系的光經過時，會沿著彎曲的測地線前進，產生如同透鏡般的放大與變形效果。<br><br>
            <strong>操作方式：</strong><br>
            • <span>滑鼠左鍵</span>：旋轉觀察視角<br>
            • <span>滑鼠滾輪</span>：縮放 (Zoom)<br>
            • <span>滑鼠右鍵</span>：平移視角
        </div>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- 1. 全域變數與場景初始化 ---
        const container = document.getElementById('canvas-container');
        const loading = document.getElementById('loading');
        
        let scene, camera, renderer, controls;
        let spacetimeGrid, lensStar, sourceGalaxy, imagePlane;
        let rayLines = [], photonParticles = [];
        
        // 物理與控制參數
        let currentMass = 2.5;
        let currentRaysCount = 4;
        const systemWidth = 30; // X軸範圍 -15 到 +15
        const photonsPerRay = 8; // 每條光線上的光子數量

        // 初始化時鐘，必須在 animate() 呼叫前宣告，避免 ReferenceError
        const clock = new THREE.Clock();

        init();
        animate();

        function init() {
            // 場景建立
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050510, 0.02);

            // 相機設定
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(15, 12, 25);

            // 渲染器設定
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // 軌道控制 (允許旋轉、縮放、平移)
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.target.set(0, -2, 0);

            // 光源
            const ambientLight = new THREE.AmbientLight(0x222244);
            scene.add(ambientLight);
            const pointLight = new THREE.PointLight(0x88ccff, 2, 50);
            scene.add(pointLight);

            // 建立宇宙元件
            createSpacetimeGrid();
            createCelestialBodies();
            createTelescopes();
            createImagePlane();
            
            // 初始更新物理狀態
            updatePhysics();

            // 事件監聽
            window.addEventListener('resize', onWindowResize);
            
            document.getElementById('massSlider').addEventListener('input', (e) => {
                currentMass = parseFloat(e.target.value);
                document.getElementById('massValue').innerText = currentMass.toFixed(1) + ' M☉';
                updatePhysics();
            });

            document.getElementById('raySlider').addEventListener('input', (e) => {
                currentRaysCount = parseInt(e.target.value);
                document.getElementById('rayValue').innerText = currentRaysCount + ' 道';
                updatePhysics();
            });

            loading.style.display = 'none';
        }

        // --- 2. 建立 3D 元件 ---

        function createSpacetimeGrid() {
            // 時空網格 (代表重力位能井)
            const size = 40;
            const divisions = 80;
            const geometry = new THREE.PlaneGeometry(size, size, divisions, divisions);
            geometry.rotateX(-Math.PI / 2);
            
            const material = new THREE.LineBasicMaterial({ 
                color: 0x4466aa, 
                transparent: true, 
                opacity: 0.4 
            });
            
            spacetimeGrid = new THREE.LineSegments(
                new THREE.WireframeGeometry(geometry), 
                material
            );
            
            // 將網格往下放，避免與中心天體重疊
            spacetimeGrid.position.y = -6; 
            // 儲存原始頂點以供後續變形
            spacetimeGrid.userData.originalVertices = Array.from(geometry.attributes.position.array);
            
            scene.add(spacetimeGrid);
        }

        function createCelestialBodies() {
            // 中心透鏡星體 (大質量物體)
            const starGeo = new THREE.SphereGeometry(1, 32, 32);
            const starMat = new THREE.MeshStandardMaterial({
                color: 0xaaccff,
                emissive: 0x2255aa,
                emissiveIntensity: 1,
                transparent: true,
                opacity: 0.9,
                wireframe: true // 增加科幻感
            });
            lensStar = new THREE.Mesh(starGeo, starMat);
            scene.add(lensStar);

            // 內部發光核
            const coreGeo = new THREE.SphereGeometry(0.5, 16, 16);
            const coreMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            lensStar.add(new THREE.Mesh(coreGeo, coreMat));

            // 背景星系 (光源)
            const galaxyGeo = new THREE.SphereGeometry(0.8, 16, 16);
            const galaxyMat = new THREE.MeshBasicMaterial({ color: 0xff6644 });
            sourceGalaxy = new THREE.Mesh(galaxyGeo, galaxyMat);
            sourceGalaxy.position.set(-15, 0, 0); // 放在X軸負向遠處
            scene.add(sourceGalaxy);

            // 星系光暈
            const haloGeo = new THREE.SphereGeometry(1.5, 16, 16);
            const haloMat = new THREE.MeshBasicMaterial({ 
                color: 0xff4422, transparent: true, opacity: 0.3 
            });
            sourceGalaxy.add(new THREE.Mesh(haloGeo, haloMat));
        }

        function createTelescopes() {
            // 在觀察者端 (X = 15) 建立電波望遠鏡陣列
            const arrayGroup = new THREE.Group();
            
            const baseGeo = new THREE.CylinderGeometry(0.2, 0.4, 1, 16);
            const dishGeo = new THREE.SphereGeometry(0.6, 16, 16, 0, Math.PI * 2, 0, Math.PI / 2);
            const mat = new THREE.MeshStandardMaterial({ color: 0xcccccc, flatShading: true });

            const positions = [
                {x: 13, z: 0}, {x: 14, z: -1.5}, {x: 14, z: 1.5}
            ];

            positions.forEach(pos => {
                const scope = new THREE.Group();
                const base = new THREE.Mesh(baseGeo, mat);
                base.position.y = 0.5;
                const dish = new THREE.Mesh(dishGeo, mat);
                dish.position.y = 1;
                dish.rotation.x = -Math.PI / 2;
                dish.rotation.y = -Math.PI / 2; // 朝向透鏡 (X=0)
                
                scope.add(base);
                scope.add(dish);
                scope.position.set(pos.x, -6, pos.z); // 放置於網格上方
                arrayGroup.add(scope);
            });

            scene.add(arrayGroup);
        }

        function createImagePlane() {
            // 用於顯示 "lensed image seen of background galaxy" 的成像平面
            const planeGeo = new THREE.PlaneGeometry(8, 8);
            
            // 建立 Canvas 作為紋理動態繪製
            imagePlane = new THREE.Mesh(planeGeo, new THREE.MeshBasicMaterial({
                transparent: true,
                opacity: 0.9,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending
            }));
            
            imagePlane.position.set(10, 0, 0); // 位於透鏡與觀察者之間
            imagePlane.rotation.y = -Math.PI / 2; // 面向觀察者
            
            imagePlane.userData.canvas = document.createElement('canvas');
            imagePlane.userData.canvas.width = 512;
            imagePlane.userData.canvas.height = 512;
            imagePlane.userData.ctx = imagePlane.userData.canvas.getContext('2d');
            imagePlane.material.map = new THREE.CanvasTexture(imagePlane.userData.canvas);
            
            // 外框線
            const edges = new THREE.EdgesGeometry(planeGeo);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.5, transparent: true }));
            imagePlane.add(line);
            
            scene.add(imagePlane);
        }

        // --- 3. 物理與幾何更新邏輯 ---

        // 計算偏折半徑 (影響參數 b 與根號 M 成正比，符合愛因斯坦環半徑公式 θ_E ∝ √M)
        function getImpactParameter(mass) {
            return 1.2 * Math.sqrt(mass);
        }

        // 核心幾何路徑函數：模擬受重力偏折的光線路徑 (使用平滑曲線逼近)
        function getPathPoint(t, mass, angleIndex, totalRays) {
            const startX = -15;
            const endX = 15;
            const x = startX + (endX - startX) * t;
            
            const b = getImpactParameter(mass);
            
            // 軟化參數避免奇異點
            const softening = 1.5; 
            
            // 模擬測地線偏折：距離中心越近，偏折量越大。
            // 使用類似雙曲線的形式來逼近真實物理光徑
            const maxH = b;
            const currentH = maxH * (15 - Math.sqrt(x * x + softening * softening)) / (15 - softening);
            
            // 決定射線的角度配置
            let angle = 0;
            if (totalRays === 1) angle = Math.PI / 4; // 單道光線給個斜角
            else if (totalRays === 2) angle = angleIndex * Math.PI; // 上下
            else angle = angleIndex * (Math.PI / 2); // 上下左右 (4道)

            // 如果 currentH < 0，代表光線越過中軸，限制為 0 避免交叉穿透現象破壞視覺
            const radius = Math.max(0, currentH);
            
            return new THREE.Vector3(x, radius * Math.cos(angle), radius * Math.sin(angle));
        }

        function updatePhysics() {
            // 1. 更新中心星體大小 (視界/物理半徑隨質量變大)
            const scale = 0.5 + currentMass * 0.2;
            lensStar.scale.set(scale, scale, scale);

            // 2. 更新時空網格曲率 (y = - GM / r)
            const geom = spacetimeGrid.geometry;
            // WireframeGeometry 的底層是 BufferGeometry，更新較為複雜
            // 我們直接替換它以保持程式碼簡單與穩定
            scene.remove(spacetimeGrid);
            
            const size = 40;
            const divisions = 80;
            const newGeo = new THREE.PlaneGeometry(size, size, divisions, divisions);
            newGeo.rotateX(-Math.PI / 2);
            
            const positions = newGeo.attributes.position.array;
            for (let i = 0; i < positions.length; i += 3) {
                const x = positions[i];
                const z = positions[i + 2];
                const r = Math.sqrt(x*x + z*z);
                // 重力位能深度，與質量成正比
                const depth = - (currentMass * 4) / Math.sqrt(r*r + 4); 
                positions[i + 1] = depth; 
            }
            newGeo.computeVertexNormals();
            
            const material = new THREE.LineBasicMaterial({ color: 0xdd6611, transparent: true, opacity: 0.3 });
            spacetimeGrid = new THREE.LineSegments(new THREE.WireframeGeometry(newGeo), material);
            spacetimeGrid.position.y = -6;
            scene.add(spacetimeGrid);

            // 3. 更新光線軌跡 (軌道線)
            rayLines.forEach(line => scene.remove(line));
            rayLines = [];
            
            for (let i = 0; i < currentRaysCount; i++) {
                const points = [];
                for (let j = 0; j <= 100; j++) {
                    points.push(getPathPoint(j / 100, currentMass, i, currentRaysCount));
                }
                const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
                const lineMat = new THREE.LineBasicMaterial({ 
                    color: 0xff6600, 
                    transparent: true, 
                    opacity: 0.6 
                });
                const line = new THREE.Line(lineGeo, lineMat);
                rayLines.push(line);
                scene.add(line);
            }

            // 4. 初始化/更新動態光子粒子陣列
            photonParticles.forEach(p => scene.remove(p));
            photonParticles = [];
            const photonGeo = new THREE.SphereGeometry(0.15, 8, 8);
            const photonMat = new THREE.MeshBasicMaterial({ color: 0xffccaa });
            
            for (let i = 0; i < currentRaysCount; i++) {
                for (let j = 0; j < photonsPerRay; j++) {
                    const photon = new THREE.Mesh(photonGeo, photonMat);
                    photon.userData = {
                        rayIndex: i,
                        offset: j / photonsPerRay // 時間偏移量
                    };
                    photonParticles.push(photon);
                    scene.add(photon);
                }
            }

            // 5. 更新成像平面 (重力透鏡效應的愛因斯坦環)
            updateImagePlaneCanvas();
        }

        function updateImagePlaneCanvas() {
            const ctx = imagePlane.userData.ctx;
            const canvas = imagePlane.userData.canvas;
            
            // 清除畫布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // 繪製背景：中央透鏡星系 (在觀測者的平面投影中，透鏡在正中央)
            ctx.fillStyle = 'rgba(150, 200, 255, 0.8)';
            ctx.beginPath();
            ctx.arc(centerX, centerY, 15 + currentMass * 3, 0, Math.PI * 2);
            ctx.fill();
            
            // 暈光
            const gradient = ctx.createRadialGradient(centerX, centerY, 10, centerX, centerY, 60);
            gradient.addColorStop(0, 'rgba(100, 150, 255, 0.5)');
            gradient.addColorStop(1, 'rgba(100, 150, 255, 0)');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 60, 0, Math.PI * 2);
            ctx.fill();

            // 繪製愛因斯坦環 (背景星系被扭曲的影像)
            // 投影半徑與衝擊參數 b 成正比
            const b = getImpactParameter(currentMass);
            const ringRadius = b * 35; 
            
            ctx.strokeStyle = 'rgba(255, 120, 50, 0.9)';
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            
            // 根據光線數量決定繪製的弧線段數，完美模擬光線不連續時看到的弧(Arcs)與完整時看到的環(Ring)
            if (currentRaysCount === 4) {
                // 近似完整的環
                ctx.beginPath();
                ctx.arc(centerX, centerY, ringRadius, 0, Math.PI * 2);
                ctx.stroke();
                
                // 增加一點材質感
                ctx.strokeStyle = 'rgba(255, 200, 100, 0.5)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(centerX, centerY, ringRadius, 0, Math.PI * 2);
                ctx.stroke();
            } else {
                // 離散的弧線 (Einstein Arcs)
                const arcLength = 0.6; // 弧長(弧度)
                for (let i = 0; i < currentRaysCount; i++) {
                    let angle = 0;
                    if (currentRaysCount === 1) angle = Math.PI / 4;
                    else if (currentRaysCount === 2) angle = i * Math.PI;
                    else angle = i * (Math.PI / 2);
                    
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, ringRadius, angle - arcLength/2, angle + arcLength/2);
                    ctx.stroke();
                }
            }
            
            // 加入文字標註 (模擬圖中的說明)
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.font = '16px sans-serif';
            ctx.fillText("lensed image seen of", 20, 30);
            ctx.fillText("background galaxy", 20, 50);

            imagePlane.material.map.needsUpdate = true;
        }

        // --- 4. 動畫迴圈 ---

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();

            controls.update();
            
            // 中心星系緩慢自轉
            lensStar.rotation.y += 0.005;
            sourceGalaxy.rotation.y += 0.01;

            // 動態更新光子位置，創造光線流動感 (從 source 到 observer)
            const speed = 0.2; // 光速模擬
            photonParticles.forEach(photon => {
                // 計算進度參數 t (0 到 1 迴圈)
                let t = ((time * speed) + photon.userData.offset) % 1.0;
                
                // 從函數取得當下 3D 座標
                const pos = getPathPoint(t, currentMass, photon.userData.rayIndex, currentRaysCount);
                photon.position.copy(pos);
                
                // 光子在接近兩端時淡出 (可選的視覺優化，此處透過縮放處理)
                let scale = 1.0;
                if(t < 0.05) scale = t / 0.05;
                if(t > 0.95) scale = (1.0 - t) / 0.05;
                photon.scale.set(scale, scale, scale);
            });

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

    </script>
</body>
</html>
