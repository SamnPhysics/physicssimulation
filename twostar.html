<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雙星系統綜合模擬：光度與光譜 (Binary Star Photometry & Spectroscopy)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: 'Noto Sans TC', sans-serif;
            overflow-x: hidden;
        }
        canvas {
            touch-action: none;
        }
        .monitor-panel {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid #334155;
            backdrop-filter: blur(5px);
        }
        .zoom-btn {
            background-color: rgba(51, 65, 85, 0.8);
            color: #e2e8f0;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid #475569;
            transition: all 0.2s;
        }
        .zoom-btn:hover {
            background-color: rgba(71, 85, 105, 1);
            border-color: #64748b;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-2 lg:p-4">

    <header class="text-center mb-4">
        <h1 class="text-2xl lg:text-3xl font-bold text-blue-400">雙星系統綜合模擬</h1>
        <p class="text-slate-400 text-xs lg:text-sm">教學模式：觀察光變曲線的主/次極小與光譜位移的關係</p>
    </header>

    <div class="flex flex-col lg:flex-row gap-4 w-full max-w-7xl h-[85vh]">
        
        <!-- 左側：視覺模擬與控制 -->
        <div class="flex-none lg:w-[35%] flex flex-col gap-4">
            <div class="monitor-panel rounded-xl p-4 flex-1 flex flex-col shadow-lg">
                <h2 class="text-lg font-semibold mb-2 text-center border-b border-slate-600 pb-2">1. 雙星軌道視圖 (俯視角度)</h2>
                <div class="relative w-full flex-1 bg-black rounded-lg overflow-hidden border border-slate-700 min-h-[250px]">
                    <canvas id="orbitCanvas" class="absolute top-0 left-0 w-full h-full"></canvas>
                    <div class="absolute top-2 left-2 text-xs text-slate-500 bg-black/50 px-2 rounded">
                        透視：下方為前 (近)，上方為後 (遠)
                    </div>
                    <!-- 即時狀態顯示 -->
                    <div id="orbitStatus" class="absolute bottom-2 right-2 text-xs font-bold text-white bg-black/60 px-2 py-1 rounded border border-slate-600 hidden">
                        狀態
                    </div>
                </div>
                <div class="mt-2 flex justify-center gap-4 text-xs">
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-blue-400 shadow-[0_0_10px_#60a5fa]"></span>
                        <span>主星 (亮/熱/藍)</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-orange-500 shadow-[0_0_10px_#f97316]"></span>
                        <span>伴星 (暗/冷/橘)</span>
                    </div>
                </div>
            </div>

            <div class="monitor-panel rounded-xl p-4 shadow-lg shrink-0">
                <div class="flex flex-col gap-3">
                    <div class="flex gap-2">
                        <button id="toggleBtn" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg transition font-medium shadow-lg border-b-4 border-blue-800 active:border-b-0 active:translate-y-1">
                            暫停 / 開始
                        </button>
                        <button id="resetBtn" class="bg-slate-600 hover:bg-slate-500 text-white px-4 py-2 rounded-lg transition font-medium shadow-lg border-b-4 border-slate-800 active:border-b-0 active:translate-y-1" title="重置模擬">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                        </button>
                    </div>
                    <div class="flex items-center gap-2 bg-slate-800 p-2 rounded-lg">
                        <label for="speedRange" class="text-sm whitespace-nowrap">演化速度:</label>
                        <input type="range" id="speedRange" min="0.2" max="2.0" step="0.1" value="0.5" class="w-full accent-blue-500 cursor-pointer">
                    </div>
                </div>
            </div>
        </div>

        <!-- 右側：圖表區 -->
        <div class="flex-1 flex flex-col gap-4">
            
            <!-- 圖表 1: 光變曲線 -->
            <div class="monitor-panel rounded-xl p-3 flex-1 flex flex-col shadow-lg relative">
                <h2 class="text-base font-semibold mb-1 text-center text-yellow-400">2. 相對亮度變化圖 (Light Curve)</h2>
                <div class="flex-1 w-full bg-slate-900 rounded-lg border border-slate-700 relative overflow-hidden group">
                    <canvas id="lightCurveCanvas" class="w-full h-full"></canvas>
                    
                    <div class="absolute top-2 left-2 flex items-center gap-1 z-10 bg-black/30 p-1 rounded backdrop-blur-sm">
                        <button id="lcZoomOut" class="zoom-btn">-</button>
                        <span id="lcScaleDisplay" class="text-xs font-mono w-10 text-center text-slate-300">x1.0</span>
                        <button id="lcZoomIn" class="zoom-btn">+</button>
                    </div>

                    <!-- 掩星標籤 -->
                    <div id="eclipseLabel" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 pointer-events-none text-center hidden">
                         <span class="text-lg font-bold text-white drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)] px-2 py-1 rounded bg-black/40 backdrop-blur-sm border border-white/20"></span>
                    </div>

                    <div class="absolute top-2 right-2 text-xs text-yellow-500 font-mono text-right">
                        Y軸: 相對亮度<br>
                        (1.0 = 雙星總和)
                    </div>
                </div>
            </div>

            <!-- 圖表 2: 光譜/徑向速度 -->
            <div class="monitor-panel rounded-xl p-3 flex-1 flex flex-col shadow-lg relative">
                <h2 class="text-base font-semibold mb-1 text-center text-green-400">3. 光譜波長變化圖 (Radial Velocity)</h2>
                <div class="flex-1 w-full bg-slate-900 rounded-lg border border-slate-700 relative overflow-hidden group">
                    <canvas id="spectrumCanvas" class="w-full h-full"></canvas>
                    
                    <div class="absolute top-2 left-2 flex items-center gap-1 z-10 bg-black/30 p-1 rounded backdrop-blur-sm">
                        <button id="spZoomOut" class="zoom-btn">-</button>
                        <span id="spScaleDisplay" class="text-xs font-mono w-10 text-center text-slate-300">x1.0</span>
                        <button id="spZoomIn" class="zoom-btn">+</button>
                    </div>

                    <div class="absolute top-2 right-2 flex flex-col items-end gap-1 pointer-events-none">
                        <div class="flex items-center gap-3 text-xs font-bold bg-black/40 p-1.5 rounded border border-slate-600/50 backdrop-blur-sm">
                            <div class="flex items-center gap-1 text-blue-400">
                                <span class="w-2.5 h-2.5 rounded-full bg-blue-400"></span>
                                主星位移
                            </div>
                            <div class="flex items-center gap-1 text-orange-400">
                                <span class="w-2.5 h-2.5 rounded-full bg-orange-500"></span>
                                伴星位移
                            </div>
                        </div>
                        <div class="text-[10px] text-slate-400 font-mono text-right mt-1">
                            Y軸: 波長位移 Δλ<br>
                            (上: 紅移/遠離 | 下: 藍移/靠近)
                        </div>
                    </div>
                </div>
                <div class="text-center text-xs text-slate-400 font-mono mt-1">
                    X 軸: 時間 (右側為現在) &rarr;
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 變數與初始化 ---
        const orbitCanvas = document.getElementById('orbitCanvas');
        const lightCurveCanvas = document.getElementById('lightCurveCanvas');
        const spectrumCanvas = document.getElementById('spectrumCanvas');
        const orbitCtx = orbitCanvas.getContext('2d');
        const lcCtx = lightCurveCanvas.getContext('2d');
        const spCtx = spectrumCanvas.getContext('2d');
        const eclipseLabel = document.getElementById('eclipseLabel');
        const orbitStatus = document.getElementById('orbitStatus');

        // 星體參數
        const starA = { 
            color: '#60a5fa', radius: 32, brightness: 100, mass: 3.0, distFromCenter: 0 
        };
        const starB = { 
            color: '#f97316', radius: 20, brightness: 40, mass: 1.0, distFromCenter: 0 
        };

        const totalSeparation = 140; 
        const totalMass = starA.mass + starB.mass;
        starA.distFromCenter = totalSeparation * (starB.mass / totalMass);
        starB.distFromCenter = totalSeparation * (starA.mass / totalMass);

        const maxFlux = (Math.PI * starA.radius**2 * starA.brightness) + (Math.PI * starB.radius**2 * starB.brightness);

        // 初始化設定: systemAngle = 0 表示雙星左右並列 (無重疊)
        const INITIAL_ANGLE = 0;
        let systemAngle = INITIAL_ANGLE; 
        let isRunning = true;
        let speedMultiplier = 0.5;
        let lcScale = 1.0;
        let spScale = 1.0;

        const maxHistory = 600;
        let fluxHistory = [];
        let velAHistory = [];
        let velBHistory = [];

        function resizeCanvases() {
            [orbitCanvas, lightCurveCanvas, spectrumCanvas].forEach(canvas => {
                canvas.width = canvas.clientWidth * 2;
                canvas.height = canvas.clientHeight * 2;
            });
        }
        window.addEventListener('resize', resizeCanvases);
        resizeCanvases();

        // --- 物理計算 ---
        function calculateOverlapArea(r1, r2, d) {
            if (d >= r1 + r2) return 0;
            if (d <= Math.abs(r1 - r2)) return Math.PI * Math.min(r1, r2)**2;
            const r1Sq = r1**2, r2Sq = r2**2;
            const angle1 = 2 * Math.acos((r1Sq + d**2 - r2Sq) / (2 * r1 * d));
            const angle2 = 2 * Math.acos((r2Sq + d**2 - r1Sq) / (2 * r2 * d));
            return 0.5 * (r2Sq * (angle2 - Math.sin(angle2)) + r1Sq * (angle1 - Math.sin(angle1)));
        }

        // --- 主循環 ---
        function update() {
            if (!isRunning) return;

            stepSimulation();
            requestAnimationFrame(update);
        }

        // 抽離單步模擬邏輯，方便 Reset 時也能調用繪圖
        function stepSimulation(isReset = false) {
            if (!isReset) {
                systemAngle += 0.015 * speedMultiplier;
            }

            // 1. 位置計算 (3D: Z軸)
            // 定義：Z < 0 為前方 (Near)，Z > 0 為後方 (Far)
            
            const xB_3d = starB.distFromCenter * Math.cos(systemAngle);
            const zB_3d = starB.distFromCenter * Math.sin(systemAngle);
            
            const xA_3d = starA.distFromCenter * Math.cos(systemAngle + Math.PI);
            const zA_3d = starA.distFromCenter * Math.sin(systemAngle + Math.PI);

            // 2. 視覺投影 (修正透視)
            const visualTilt = 0.3; 
            const cx = orbitCanvas.width / 2;
            const cy = orbitCanvas.height / 2;
            
            const xB_screen = cx + xB_3d * 2;
            const yB_screen = cy - zB_3d * 2 * visualTilt; 
            
            const xA_screen = cx + xA_3d * 2;
            const yA_screen = cy - zA_3d * 2 * visualTilt;

            // 3. 光度計算與狀態
            const projectedDist = Math.abs(xB_3d - xA_3d);
            let blockedFlux = 0;
            let statusText = "";
            let statusColor = "";

            if (projectedDist < (starA.radius + starB.radius)) {
                const overlap = calculateOverlapArea(starA.radius, starB.radius, projectedDist);
                
                if (zB_3d < zA_3d) { 
                    // B (Z負) 在 A (Z正) 前面 -> 橘星擋藍星 -> 主極小
                    blockedFlux = overlap * starA.brightness;
                    statusText = "主極小 (Primary Eclipse)\n橘星(前/暗) 遮 藍星(後/亮)";
                    statusColor = "text-red-400";
                } else {
                    // A (Z負) 在 B (Z正) 前面 -> 藍星擋橘星 -> 次極小
                    blockedFlux = overlap * starB.brightness;
                    statusText = "次極小 (Secondary Eclipse)\n藍星(前/亮) 遮 橘星(後/暗)";
                    statusColor = "text-yellow-300";
                }
            }
            
            // 更新 UI 標籤
            if (statusText) {
                eclipseLabel.classList.remove('hidden');
                eclipseLabel.querySelector('span').innerText = statusText;
                eclipseLabel.querySelector('span').className = `text-lg font-bold drop-shadow-md px-3 py-1 rounded bg-black/60 border border-white/20 whitespace-pre-line text-center ${statusColor}`;
                orbitStatus.classList.remove('hidden');
                orbitStatus.innerText = statusText.replace('\n', ' - ');
            } else {
                eclipseLabel.classList.add('hidden');
                orbitStatus.classList.add('hidden');
            }

            const currentFlux = (maxFlux - blockedFlux) / maxFlux;
            
            // 4. 徑向速度
            // 當星體走向後方 (Z變大) -> 遠離 -> 紅移 (+)
            const vFactor = Math.cos(systemAngle); 
            const vb = vFactor * 1.0; 
            const va = -vFactor * (starB.mass / starA.mass);

            // 更新歷史數據
            // 如果是 Reset，我們先清空再推入當前狀態
            if (isReset) {
                fluxHistory = [currentFlux];
                velAHistory = [va];
                velBHistory = [vb];
            } else {
                fluxHistory.push(currentFlux);
                velAHistory.push(va);
                velBHistory.push(vb);
                
                if (fluxHistory.length > maxHistory) {
                    fluxHistory.shift();
                    velAHistory.shift();
                    velBHistory.shift();
                }
            }

            drawOrbit(cx, cy, xA_screen, yA_screen, zA_3d, xB_screen, yB_screen, zB_3d);
            drawLightCurve();
            drawSpectrum();
        }

        // --- 繪圖函數 ---
        function drawOrbit(cx, cy, xA, yA, zA, xB, yB, zB) {
            orbitCtx.clearRect(0, 0, orbitCanvas.width, orbitCanvas.height);
            
            // 繪製軌道路徑
            orbitCtx.lineWidth = 2;
            orbitCtx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
            
            [starA.distFromCenter, starB.distFromCenter].forEach(r => {
                orbitCtx.beginPath();
                orbitCtx.ellipse(cx, cy, r*2, r*2*0.3, 0, 0, Math.PI*2);
                orbitCtx.stroke();
            });

            // 質心
            orbitCtx.fillStyle = '#fff';
            orbitCtx.fillRect(cx-2, cy-2, 4, 4);

            // Z-Sort
            const stars = [
                { x: xA, y: yA, z: zA, r: starA.radius, c: starA.color },
                { x: xB, y: yB, z: zB, r: starB.radius, c: starB.color }
            ].sort((a, b) => b.z - a.z);

            stars.forEach(s => {
                orbitCtx.beginPath();
                const scale = 1 + (s.z * -0.002); 
                orbitCtx.arc(s.x, s.y, s.r * scale, 0, Math.PI * 2);
                orbitCtx.fillStyle = s.c;
                orbitCtx.shadowBlur = 20;
                orbitCtx.shadowColor = s.c;
                orbitCtx.fill();
            });
        }

        function drawLightCurve() {
            const w = lightCurveCanvas.width;
            const h = lightCurveCanvas.height;
            lcCtx.clearRect(0, 0, w, h);

            const baselineY = h * 0.25;

            // 基準線
            lcCtx.strokeStyle = '#334155';
            lcCtx.setLineDash([4, 4]);
            lcCtx.beginPath();
            lcCtx.moveTo(0, baselineY); 
            lcCtx.lineTo(w, baselineY); 
            lcCtx.stroke();
            lcCtx.setLineDash([]);
            lcCtx.fillStyle = '#94a3b8';
            lcCtx.font = '24px monospace'; 
            lcCtx.fillText('1.0', 10, baselineY - 10);

            if (fluxHistory.length < 1) return;

            lcCtx.beginPath();
            lcCtx.lineWidth = 4;
            lcCtx.strokeStyle = '#facc15';
            
            const yMap = (val) => baselineY + (1 - val) * (h * 1.5 * lcScale);
            
            // 如果歷史數據很少，我們從右邊開始畫，避免線條橫跨整個螢幕
            const drawStartIndex = Math.max(0, fluxHistory.length - maxHistory);
            
            for (let i = 0; i < fluxHistory.length; i++) {
                // x 座標：從右向左推移，最右邊是最新數據
                // 當數據未滿 maxHistory 時，從左邊開始畫
                // 當數據滿時，最右邊固定在 w
                
                let x;
                if (fluxHistory.length < maxHistory) {
                     x = (i / maxHistory) * w;
                } else {
                     x = (i / maxHistory) * w; // 保持一致，數據結構已在 update 中 shift
                }
                
                const y = yMap(fluxHistory[i]);
                if (i === 0) lcCtx.moveTo(x, y);
                else lcCtx.lineTo(x, y);
            }
            lcCtx.stroke();

            // "現在" 指示線
            const curX = (fluxHistory.length - 1) / maxHistory * w;
            const curY = yMap(fluxHistory[fluxHistory.length-1]);
            
            lcCtx.beginPath();
            lcCtx.moveTo(curX, 0);
            lcCtx.lineTo(curX, h);
            lcCtx.strokeStyle = 'rgba(239, 68, 68, 0.5)';
            lcCtx.lineWidth = 1;
            lcCtx.stroke();

            lcCtx.fillStyle = '#fff';
            lcCtx.beginPath();
            lcCtx.arc(curX, curY, 6, 0, Math.PI*2);
            lcCtx.fill();
        }

        function drawSpectrum() {
            const w = spectrumCanvas.width;
            const h = spectrumCanvas.height;
            spCtx.clearRect(0, 0, w, h);

            const cy = h / 2;
            spCtx.strokeStyle = '#334155';
            spCtx.setLineDash([4, 4]);
            spCtx.beginPath();
            spCtx.moveTo(0, cy);
            spCtx.lineTo(w, cy);
            spCtx.stroke();
            spCtx.setLineDash([]);
            spCtx.fillStyle = '#94a3b8';
            spCtx.fillText('λ₀ (靜止)', 10, cy - 8);

            if (velAHistory.length < 1) return;

            const drawLine = (data, color) => {
                spCtx.beginPath();
                spCtx.lineWidth = 3;
                spCtx.strokeStyle = color;
                const scaleY = h * 0.35 * spScale; 
                for (let i = 0; i < data.length; i++) {
                    const x = (i / maxHistory) * w;
                    const y = cy - (data[i] * scaleY); 
                    if (i === 0) spCtx.moveTo(x, y);
                    else spCtx.lineTo(x, y);
                }
                spCtx.stroke();
                
                const curX = (data.length - 1) / maxHistory * w;
                const curY = cy - (data[data.length - 1] * scaleY);
                spCtx.fillStyle = color;
                spCtx.beginPath();
                spCtx.arc(curX, curY, 5, 0, Math.PI*2);
                spCtx.fill();
            };

            drawLine(velAHistory, '#60a5fa');
            drawLine(velBHistory, '#f97316');

            // "現在" 指示線
            const curX = (velAHistory.length - 1) / maxHistory * w;
            spCtx.beginPath();
            spCtx.moveTo(curX, 0); 
            spCtx.lineTo(curX, h);
            spCtx.strokeStyle = 'rgba(239, 68, 68, 0.5)';
            spCtx.lineWidth = 1;
            spCtx.stroke();
        }

        // --- 事件綁定 ---
        document.getElementById('toggleBtn').onclick = () => {
            isRunning = !isRunning;
            if(isRunning) update();
        };
        
        document.getElementById('resetBtn').onclick = () => {
            systemAngle = INITIAL_ANGLE;
            // 重置歷史，這裡我們先清空
            fluxHistory = [];
            velAHistory = [];
            velBHistory = [];
            
            // 立即執行一步模擬 (isReset = true) 來繪製初始狀態
            stepSimulation(true);
            
            // 重置後通常不需要暫停，或者看您需求。這裡我保持 isRunning 狀態，
            // 但如果之前是暫停的，重置後會顯示第一幀並停在那。
            if (!isRunning) {
               // 已經 draw 在 stepSimulation 裡了
            }
        };

        document.getElementById('speedRange').oninput = (e) => speedMultiplier = parseFloat(e.target.value);
        
        const updateZoom = () => {
             document.getElementById('lcScaleDisplay').textContent = `x${lcScale.toFixed(1)}`;
             document.getElementById('spScaleDisplay').textContent = `x${spScale.toFixed(1)}`;
        };
        document.getElementById('lcZoomIn').onclick = () => { if(lcScale < 5) lcScale+=0.5; updateZoom(); };
        document.getElementById('lcZoomOut').onclick = () => { if(lcScale > 0.5) lcScale-=0.5; updateZoom(); };
        document.getElementById('spZoomIn').onclick = () => { if(spScale < 5) spScale+=0.5; updateZoom(); };
        document.getElementById('spZoomOut').onclick = () => { if(spScale > 0.5) spScale-=0.5; updateZoom(); };

        // 初始啟動
        requestAnimationFrame(update);
    </script>
</body>
</html>
